version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge_local
      POSTGRES_DB: forge_dev
    volumes:
      - forge_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - forge_qdrant_storage:/qdrant/storage

  runtime-daemon:
    build:
      context: .
      dockerfile: apps/runtime-daemon/Dockerfile
    ports:
      - "4100:4100"
    environment:
      FORGE_DAEMON_PORT: "4100"
      FORGE_RUNTIME_LOCAL_SUPERVISOR_ENABLED: "true"
      FORGE_RUNTIME_SCOPE_SIDECAR_OWNERSHIP_ENABLED: "true"
    depends_on:
      - postgres

volumes:
  forge_pg_data:
  forge_qdrant_storage:
